<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cotizador | FarmaSalud Contulmo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        farmaGreen: '#8DC63F', 
                        farmaPurple: '#752888', 
                        farmaDarkPurple: '#561c65' 
                    } 
                } 
            } 
        }
    </>

    <style>
        body { font-family: 'Segoe UI', sans-serif; overflow-x: hidden; touch-action: pan-y; background-color: #f4f7f6; }
        .loader { border: 4px solid #e5e7eb; border-top: 4px solid #752888; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .texto-ajustable { word-wrap: break-word; overflow-wrap: break-word; white-space: normal; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animación suave para el carrito modal */
        #cartModal { transition: opacity 0.3s ease-in-out; }
        .modal-content { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="flex flex-col min-h-screen pb-24">

    <header class="bg-white shadow-md sticky top-0 z-40">
        <div class="px-4 py-4 flex justify-between items-center max-w-7xl mx-auto w-full">
            <div class="flex items-center gap-3">
                <div class="relative flex items-center justify-center w-12 h-12 bg-farmaPurple rounded-full shadow-md">
                    <i class="fa-solid fa-plus text-white text-3xl"></i>
                </div>
                <div class="leading-none">
                    <h1 class="text-2xl font-extrabold tracking-tight">
                        <span class="text-farmaGreen">FARMA</span><span class="text-farmaPurple">SALUD</span>
                    </h1>
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Contulmo</span>
                </div>
            </div>
            <div class="hidden md:flex items-center text-sm font-semibold text-gray-500">
                <i class="fa-solid fa-location-dot text-farmaGreen mr-2"></i> Los Canelos 651-b, Contulmo.
            </div>
        </div>
    </header>

    <section class="bg-farmaPurple py-8 relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/20"></div>
        <div class="max-w-3xl mx-auto px-4 relative z-10 text-center">
            <h2 class="text-white text-2xl md:text-3xl font-extrabold mb-2">Cotizador de Precios</h2>
            <p class="text-purple-200 text-sm md:text-base mb-6 font-medium">Busca tus medicamentos y calcula tu total al instante.</p>

            <div class="bg-white p-1.5 rounded-2xl shadow-xl flex items-center gap-2">
                <i class="fa-solid fa-magnifying-glass text-gray-400 text-xl ml-4"></i>
                <input type="text" id="searchInput" class="w-full py-3 px-2 text-base md:text-lg outline-none text-gray-700 bg-transparent placeholder-gray-400" placeholder="Ej: Paracetamol, Losartan..." autocomplete="off" disabled>
            </div>
        </div>
    </section>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 py-6">
        
        <div id="statusContainer" class="flex flex-col items-center justify-center text-gray-500 my-16 gap-3">
            <div class="loader"></div>
            <span class="font-semibold text-base text-farmaPurple">Cargando catálogo actualizado...</span>
        </div>

        <div class="flex justify-between items-center mb-4 hidden" id="resultsHeader">
            <div class="text-sm text-gray-600 font-bold bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-100" id="resultsCount"></div>
        </div>

        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        
        <div id="pagination" class="flex justify-center items-center gap-2 mt-10 mb-8 flex-wrap"></div>
    </main>

    <div id="floatingCart" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] z-50 transform translate-y-full transition-transform duration-300">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-xs text-gray-500 font-bold uppercase">Total Cotización</span>
                <span id="floatingTotal" class="text-2xl font-black text-farmaPurple">$0</span>
            </div>
            <button onclick="toggleCart()" class="bg-farmaGreen hover:bg-green-600 text-white px-6 py-3 rounded-xl font-bold shadow-md transition flex items-center gap-2">
                <i class="fa-solid fa-cart-shopping"></i> <span id="floatingCount">0</span> Ítems
            </button>
        </div>
    </div>

    <div id="cartModal" class="fixed inset-0 bg-black/60 z-[60] hidden opacity-0 flex justify-end">
        <div class="modal-content w-full md:w-[400px] bg-gray-50 h-full flex flex-col transform translate-x-full">
            
            <div class="bg-white px-5 py-4 flex justify-between items-center border-b border-gray-100 shadow-sm">
                <h2 class="text-xl font-extrabold text-gray-800"><i class="fa-solid fa-receipt text-farmaGreen mr-2"></i> Tu Cotización</h2>
                <button onclick="toggleCart()" class="text-gray-400 hover:text-red-500 transition text-2xl">&times;</button>
            </div>

            <div id="cartItems" class="flex-grow overflow-y-auto p-4 flex flex-col gap-3">
                </div>

            <div class="bg-white border-t border-gray-200 p-5 shadow-[0_-4px_10px_rgba(0,0,0,0.02)]">
                <div class="flex justify-between items-end mb-4">
                    <span class="text-gray-500 font-bold">Total a Pagar:</span>
                    <span id="cartTotal" class="text-3xl font-black text-farmaPurple">$0</span>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="clearCart()" class="bg-red-50 text-red-500 hover:bg-red-100 px-4 py-3 rounded-xl font-bold transition flex-1 border border-red-100">
                        Vaciar
                    </button>
                    <button onclick="sendWhatsApp('56974284130')" class="bg-[#25D366] hover:bg-[#1EBE5C] text-white px-4 py-3 rounded-xl font-bold transition flex-[2] flex justify-center items-center gap-2 shadow-md">
                        <i class="fa-brands fa-whatsapp text-lg"></i> Enviar a Farmacia
                    </button>
                </div>
                <p class="text-[10px] text-center text-gray-400 mt-3 font-semibold">* Los precios son referenciales y sujetos a disponibilidad física en el local.</p>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ENLACE DE GOOGLE SHEETS (MAESTRO 17 JUNIO u 11 JUNIO)
        const URL_CSV_MAESTRO = const URL_CSV_MAESTRO = "https://docs.google.com/spreadsheets/d/1GjVV8vuErPNmOIVkP-pk6VPiTrlf4IQby2v-OS0J3Zg/export?format=csv&gid=1307499139&nocache=" + new Date().getTime();;
        // ==========================================

        let allProducts = [];
        let filteredProducts = [];
        let cart = []; // Array para guardar {id, nombre, precio, cantidad}
        
        let currentPage = 1;
        const itemsPerPage = 24;
        const clpFmt = new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', minimumFractionDigits: 0 });

        window.onload = () => {
            document.getElementById('searchInput').addEventListener('input', () => {
                currentPage = 1;
                applyFilters();
            });

            Papa.parse(URL_CSV_MAESTRO, {
                download: true,
                header: false,
                complete: function(results) { procesarDatos(results.data); },
                error: function() { document.getElementById('statusContainer').innerHTML = "<p class='text-red-500 font-bold'>Error al cargar el catálogo.</p>"; }
            });
        };

        function procesarDatos(rawData) {
            let tempProducts = [];
            let headerRowIndex = -1; 
            
            for (let i = 0; i < Math.min(20, rawData.length); i++) {
                if (rawData[i].includes("LAB") && rawData[i].includes("DETALLE")) { headerRowIndex = i; break; }
            }
            if(headerRowIndex === -1) headerRowIndex = 5;

            for (let i = headerRowIndex + 1; i < rawData.length; i++) {
                const row = rawData[i];
                if (!row || row.length < 8) continue;

                let precioStr = typeof row[7] === 'string' ? row[7].replace(/[^0-9]/g, '') : row[7];
                let precio = parseInt(precioStr);
                let stock = parseInt(row[10]) || 0;
                let nombre = String(row[4]).trim();

                // Filtro para CLIENTES: Solo productos con nombre, precio mayor a 0 y que no sean uso interno.
                if (nombre && !isNaN(precio) && precio > 0) {
                    tempProducts.push({
                        id: btoa(unescape(encodeURIComponent(nombre))).substring(0, 15) + i,
                        lab: row[0] || '',
                        nombre: nombre,
                        precio: precio,
                        disponible: stock > 0 // Booleano, ocultamos el número real
                    });
                }
            }

            allProducts = tempProducts;
            document.getElementById('statusContainer').style.display = 'none';
            document.getElementById('resultsHeader').classList.remove('hidden');
            document.getElementById('searchInput').disabled = false;
            applyFilters();
        }

        function applyFilters() {
            const terms = document.getElementById('searchInput').value.toLowerCase().trim().split(' ');

            if (terms[0] === "") {
                filteredProducts = allProducts;
            } else {
                filteredProducts = allProducts.filter(p => {
                    const searchable = `${p.nombre} ${p.lab}`.toLowerCase();
                    return terms.every(t => searchable.includes(t));
                });
            }
            renderPage();
        }

        function renderPage() {
            const grid = document.getElementById('productsGrid');
            const totalItems = filteredProducts.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            document.getElementById('resultsCount').innerHTML = `Mostrando ${totalItems} productos`;
            grid.innerHTML = '';

            if (totalItems === 0) {
                grid.innerHTML = `<div class="col-span-full py-16 text-center text-gray-400"><i class="fa-solid fa-pills text-5xl mb-4 text-gray-300"></i><p class="text-lg">No encontramos ese producto.</p></div>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const currentItems = filteredProducts.slice((currentPage - 1) * itemsPerPage, (currentPage - 1) * itemsPerPage + itemsPerPage);

            currentItems.forEach(item => {
                const cartItem = cart.find(c => c.id === item.id);
                const qtyInCart = cartItem ? cartItem.cantidad : 0;
                
                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex flex-col h-full hover:shadow-md transition duration-200`;
                
                let stockBadge = item.disponible 
                    ? `<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-[10px] font-extrabold uppercase"><i class="fa-solid fa-check"></i> Disponible</span>`
                    : `<span class="bg-red-50 text-red-500 px-2 py-0.5 rounded text-[10px] font-extrabold uppercase"><i class="fa-solid fa-xmark"></i> Agotado</span>`;

                let btnHtml = item.disponible 
                    ? `<button onclick="addToCart('${item.id}', '${item.nombre.replace(/'/g, "\\'")}', ${item.precio})" class="w-full mt-4 bg-purple-50 text-farmaPurple hover:bg-farmaPurple hover:text-white border border-purple-100 font-bold py-2 rounded-xl transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus"></i> Agregar
                       </button>`
                    : `<button disabled class="w-full mt-4 bg-gray-50 text-gray-400 font-bold py-2 rounded-xl cursor-not-allowed border border-gray-100">Sin Stock</button>`;

                // Si ya está en el carrito, mostrar controles de cantidad en la tarjeta
                if(qtyInCart > 0) {
                    btnHtml = `
                        <div class="w-full mt-4 flex items-center justify-between bg-farmaPurple text-white rounded-xl overflow-hidden shadow-sm">
                            <button onclick="updateQty('${item.id}', -1)" class="px-4 py-2 hover:bg-farmaDarkPurple font-bold transition">-</button>
                            <span class="font-bold">${qtyInCart} en lista</span>
                            <button onclick="updateQty('${item.id}', 1)" class="px-4 py-2 hover:bg-farmaDarkPurple font-bold transition">+</button>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="text-[10px] font-black text-gray-400 uppercase tracking-wider">${item.lab}</div>
                        ${stockBadge}
                    </div>
                    <h3 class="text-sm md:text-base font-bold text-gray-800 mb-3 leading-snug texto-ajustable flex-grow">${item.nombre}</h3>
                    
                    <div class="text-2xl font-black text-farmaPurple leading-none">${clpFmt.format(item.precio)}</div>
                    
                    ${btnHtml}
                `;
                grid.appendChild(card);
            });

            renderPagination(totalPages);
        }

        // ==========================================
        // LÓGICA DEL CARRITO (COTIZADOR)
        // ==========================================

        function addToCart(id, nombre, precio) {
            cart.push({ id, nombre, precio, cantidad: 1 });
            updateCartUI();
            renderPage(); // Refrescar tarjeta
        }

        function updateQty(id, change) {
            let itemIndex = cart.findIndex(c => c.id === id);
            if(itemIndex > -1) {
                cart[itemIndex].cantidad += change;
                if(cart[itemIndex].cantidad <= 0) {
                    cart.splice(itemIndex, 1); // Remover si llega a 0
                }
            }
            updateCartUI();
            renderPage(); // Refrescar tarjetas de la cuadrícula
            renderCartModal(); // Refrescar modal si está abierto
        }

        function clearCart() {
            if(confirm("¿Deseas vaciar tu cotización?")) {
                cart = [];
                updateCartUI();
                renderPage();
                toggleCart(); // Cerrar modal
            }
        }

        function updateCartUI() {
            const floatingCart = document.getElementById('floatingCart');
            const countLabel = document.getElementById('floatingCount');
            const totalLabel = document.getElementById('floatingTotal');
            const modalTotalLabel = document.getElementById('cartTotal');

            let totalItems = 0;
            let totalMoney = 0;

            cart.forEach(item => {
                totalItems += item.cantidad;
                totalMoney += (item.precio * item.cantidad);
            });

            countLabel.innerText = totalItems;
            totalLabel.innerText = clpFmt.format(totalMoney);
            modalTotalLabel.innerText = clpFmt.format(totalMoney);

            // Mostrar u ocultar barra flotante
            if(totalItems > 0) {
                floatingCart.classList.remove('translate-y-full');
            } else {
                floatingCart.classList.add('translate-y-full');
                // Si el modal está abierto y se vacía, cerrarlo
                if(!document.getElementById('cartModal').classList.contains('hidden')) {
                    toggleCart();
                }
            }
        }

        function toggleCart() {
            const modal = document.getElementById('cartModal');
            const content = modal.querySelector('.modal-content');
            
            if(modal.classList.contains('hidden')) {
                // Abrir
                modal.classList.remove('hidden');
                renderCartModal();
                // Pequeño timeout para la animación
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    content.classList.remove('translate-x-full');
                }, 10);
            } else {
                // Cerrar
                modal.classList.add('opacity-0');
                content.classList.add('translate-x-full');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }

        function renderCartModal() {
            const container = document.getElementById('cartItems');
            container.innerHTML = '';

            if(cart.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400"><p>Tu cotización está vacía</p></div>`;
                return;
            }

            cart.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center";
                div.innerHTML = `
                    <div class="flex-grow pr-2">
                        <h4 class="text-sm font-bold text-gray-800 leading-tight texto-ajustable mb-1">${item.nombre}</h4>
                        <div class="text-xs font-bold text-farmaPurple">${clpFmt.format(item.precio)} c/u</div>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <div class="font-black text-gray-800">${clpFmt.format(item.precio * item.cantidad)}</div>
                        <div class="flex items-center bg-gray-100 rounded-lg overflow-hidden">
                            <button onclick="updateQty('${item.id}', -1)" class="px-3 py-1 hover:bg-gray-200 text-gray-600 font-bold transition">-</button>
                            <span class="px-2 text-sm font-bold text-gray-800">${item.cantidad}</span>
                            <button onclick="updateQty('${item.id}', 1)" class="px-3 py-1 hover:bg-gray-200 text-gray-600 font-bold transition">+</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function sendWhatsApp(phone) {
            if(cart.length === 0) return;

            let total = 0;
            let text = "Hola FarmaSalud! 👋%0AQuisiera consultar por la siguiente cotización:%0A%0A";
            
            cart.forEach(item => {
                let sub = item.precio * item.cantidad;
                total += sub;
                text += `🔸 ${item.cantidad}x ${item.nombre} (${clpFmt.format(sub)})%0A`;
            });

            text += `%0A*Total estimado: ${clpFmt.format(total)}*%0A%0A¿Tienen disponibilidad de estos productos?`;

            // Redirigir a WhatsApp
            window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
        }

        // ==========================================
        // PAGINACIÓN
        // ==========================================
        function renderPagination(totalPages) {
            const container = document.getElementById('pagination'); container.innerHTML = '';
            if (totalPages <= 1) return;
            const createBtn = (html, disabled, onClick) => {
                const b = document.createElement('button'); b.innerHTML = html; b.disabled = disabled; b.onclick = onClick;
                b.className = `w-10 h-10 rounded-xl flex items-center justify-center border-2 font-bold mx-1 transition ${disabled ? 'text-gray-300 border-gray-100 cursor-not-allowed bg-white' : 'text-farmaPurple border-farmaPurple hover:bg-farmaPurple hover:text-white bg-white'}`;
                return b;
            };
            container.appendChild(createBtn('<i class="fa-solid fa-chevron-left"></i>', currentPage === 1, () => { currentPage--; renderPage(); window.scrollTo(0, 0); }));
            const info = document.createElement('span'); info.className = "text-sm font-bold text-gray-600 px-4 bg-white py-2 rounded-xl border border-gray-100 shadow-sm"; info.innerText = `Pág ${currentPage} de ${totalPages}`; container.appendChild(info);
            container.appendChild(createBtn('<i class="fa-solid fa-chevron-right"></i>', currentPage === totalPages, () => { currentPage++; renderPage(); window.scrollTo(0, 0); }));
        }
    </script>
</body>
</html>
